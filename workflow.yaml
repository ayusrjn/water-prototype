name: pneumonia_detection
execution:
  docker_image: water/opencv-infer:latest
  entrypoint: python /app/infer.py
  timeout_minutes: 30
resources:
  requires_gpu: false
  min_ram_gb: 8
data:
  input_path: /data/dicoms/patient_batch_01
  sensitivity: restricted
  must_stay_local: false
placement:
  target_node_id: laptop-edge
