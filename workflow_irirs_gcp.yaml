# Pulls python:3.10-slim on the VM; syncs iris_task/ (includes train.py and optionally dataset.csv).
name: logistic_regression_iris_gcp
execution:
  docker_image: python:3.10-slim
  entrypoint: pip install --no-cache-dir -q pandas==2.2.3 scikit-learn==1.5.2 && python /data/input/train2.py
  timeout_minutes: 30
resources:
  requires_gpu: false
  min_ram_gb: 2
data:
  # Updated the target folder to 'iris_task' to separate it from example2
  input_path: /home/ayush-ranjan/Documents/water_prototype/example3
  sensitivity: restricted
  must_stay_local: false
placement:
  target_node_id: laptop-edge-2
transfer:
  sync_input_to_remote: true
  remote_input_path: /home/ayushraanjan/example3